name: Build Android arm64-v8a

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build the image once; cache via GHA so subsequent runs skip the heavy gRPC build.
      - name: Build builder image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          tags: collab-media-controller-build:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build libmediacontroller.a (arm64-v8a)
        run: |
          docker run --rm \
            -v "$PWD":/work \
            -w /work \
            collab-media-controller-build:latest \
            bash -lc 'bash build_android64.sh'

      - name: Package distribution
        run: |
          docker run --rm \
            -v "$PWD":/work \
            -w /work \
            collab-media-controller-build:latest \
            bash -lc 'bash dist_android64.sh'

      - name: Upload distribution zip
        uses: actions/upload-artifact@v4
        with:
          name: collab_media_controller_dist
          path: collab_media_controller_dist.zip
          if-no-files-found: error

      - name: Upload static library
        uses: actions/upload-artifact@v4
        with:
          name: libmediacontroller-arm64-v8a
          path: build-arm64/sources/libmediacontroller.a
          if-no-files-found: error
