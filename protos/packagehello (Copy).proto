syntax = "proto3";
package grpc_str_out;

service IntStreamoutSvcStrl {
  
  rpc SayHello (HelloRequest) returns (HelloReply) {}

  rpc rpc_Streamout_SetPort (SetPortRequest) returns (StreamoutResponse) {}
  rpc rpc_Streamout_SetStreamPipeline (SetStreamPipelineRequest) returns (StreamoutResponse) {}
  rpc rpc_Streamout_Start (StartRequest) returns (StreamoutResponse) {}
  rpc rpc_Streamout_Stop (StopRequest) returns (StreamoutResponse) {}
  rpc rpc_Streamout_RtspServerDebug (RtspServerDebugRequest) returns (StreamoutResponse) {}
}

message StreamoutStatus {
  bool running = 1;
  string state = 2;
  string detail = 3;
}

message HelloRequest { string name = 1; }
message HelloReply { string message = 1; }


message SetPortRequest {
  string port = 1;
}
message SetStreamPipelineRequest {
  string pipeline = 1;
}
message RtspServerDebugRequest {
  string debug_string = 1;
}
message StartRequest {
  int32 arg = 1;
}
message StopRequest {
  int32 arg = 1;
}

message StreamoutResponse {
  bool success = 1;
  string message = 2;
}